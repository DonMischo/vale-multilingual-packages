  username: brugernavn
  download: download (accepteret) / downloading
  upload: upload (accepteret) / uploading
  update: opdatering
  updates: opdateringer
  backup: sikkerhedskopi / backup (accepteret)
  backups: sikkerhedskopier
  hardware: hardware (accepteret) / udstyr
  software: software (accepteret) / programmer
  app: app (accepteret) / applikation
