# Kilder / Sources:
#   - Dansk Sprognævn: dsn.dk — ordrådgivning om anglicismer
#   - Galberg Jacobsen, Henrik / Jarvad, Pia: "Dansk Sproglære" (Gyldendal, 2010)
#   - Jarvad, Pia: "Nye ord — hvorfor og hvordan?" (Gyldendal, 1999)
#   - ODS: "Ordbog over det Danske Sprog" (ordnet.dk)
#   - Hannemand, Bjarne: "Godt Sprog" (Gyldendal, 2009)
extends: substitution
message: "Anglicisme: '%s' — på dansk: '%s'?"
level: suggestion
ignorecase: true
swap:
  # --- Møder og forretningsorganisation (Dansk Sprognævn; Jarvad) ---
  meeting: møde / samling
  meetings: møder
  briefing: orientering / briefing (accepteret)
  debriefing: eftermøde / evaluering
  brainstorming: idéstorm / brainstorming (accepteret)
  workshop: workshop (accepteret) / arbejdsseminar
  workshops: arbejdsseminarer
  deadline: frist / tidsfrist
  deadlines: frister
  networking: netværkspleje / networking (accepteret)
  staff: personale / medarbejdere
  manager: leder / chef / manager (accepteret)
  managers: ledere
  management: ledelse / management (accepteret)
  outsourcing: outsourcing (accepteret) / udlicitering
  freelance: freelance (accepteret) / frilanser
  startup: startup (accepteret) / ny virksomhed
  pitch: pitch (accepteret) / præsentation
  feedback: tilbagemelding / feedback (accepteret)
  newsletter: nyhedsbrev
  newsletters: nyhedsbreve
  ranking: rangering / rangliste
  lobbying: lobbyisme / lobbyvirksomhed
  target: mål / målgruppe
  targets: mål
  benchmark: referencepunkt / benchmark (accepteret)
  copyright: ophavsret
  joint venture: joint venture (accepteret) / samarbejdsaftale

