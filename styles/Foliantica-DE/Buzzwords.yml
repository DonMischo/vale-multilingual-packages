# Quellen / Sources:
#   - Wolf Schneider: "Deutsch fürs Leben" (Rowohlt, 1994), Kap. "Modewörter"
#   - Wolf Schneider: "Deutsch! Das Handbuch für attraktives Schreiben" (Rowohlt, 2005)
#   - Bastian Sick: Zwiebelfisch-Kolumnen (Spiegel Online)
#   - Gesellschaft für deutsche Sprache (GfdS): Wörter des Jahres (Unwörter & Modewörter)
#   - Unwort des Jahres (Jury der Sprachkritik, seit 1991), www.unwortdesjahres.net
#   - Norbert Bolz: Kritik der Mediengesellschaft (2001)
extends: existence
message: "'%s' ist ein Buzzword / Modewort — konkreter formulieren?"
level: suggestion
ignorecase: true
tokens:
  # --- Unternehmens-Buzzwords (Schneider; GfdS Unwörter) ---
  # NOTE: "Agilität/agil, Roadmap, Milestone(s), KPI(s), Scrum, Lean, Stakeholder(s),
  # Digitalisierung, Benchmark(s)/benchmarken, Skalierung/skalierbar/skalieren,
  # Ökosystem, ROI, USP, Transformation/transformativ" entfernt — das sind etablierte
  # Fach-/Geschäftsbegriffe, kein Modewort-Indikator für sich allein.
  - Mehrwert
  - Synergien
  - Synergie
  - Synergieeffekte
  - Paradigmenwechsel
  - Disruption
  - disruptiv
