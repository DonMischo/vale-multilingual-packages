# Quellen / Sources:
#   - Bastian Sick: "Der Dativ ist dem Genitiv sein Tod", Bd. 1-3 (Kiepenheuer & Witsch, 2004-)
#   - Duden: "Richtiges und gutes Deutsch" (Bd. 9, 7. Aufl. 2011)
#   - Wolf Schneider: "Deutsch fürs Leben" (Rowohlt, 1994)
#   - Dudenredaktion: "Zweifelsfälle der deutschen Sprache" (Duden Bd. 9)
extends: existence
message: "'%s' — Verwechslungsgefahr oder häufiger Stilfehler: prüfen?"
level: warning
ignorecase: false
tokens:
  # NOTE: "scheinbar" wurde entfernt — die Verwechslung mit "anscheinend" betrifft nur
  # einen Teil der Verwendungen; eine existence-Regel kann korrekten von falschem
  # Gebrauch nicht unterscheiden und würde jede korrekte Verwendung mitflaggen.

  # --- Falsche Vergleichspartikel: "wie" statt "als" nach Komparativ (Sick; Duden) ---
  # Richtig: "größer als", "besser als", "mehr als" — nicht "wie"
  - größer wie
  - kleiner wie
  - besser wie
  - schlechter wie
  - schneller wie
  - langsamer wie
  - mehr wie
  - weniger wie
  - älter wie
  - jünger wie
  - höher wie
  - niedriger wie
  - stärker wie
  - schwächer wie
  - früher wie
  - später wie
  - weiter wie
  - näher wie
  - anders wie
  - als wie

  # NOTE: "derselbe/dieselbe/dasselbe" und "aktuell" wurden entfernt — beide Wörter sind
  # in den meisten Fällen korrekt verwendet; eine existence-Regel kann den seltenen
  # Fehlgebrauch nicht von der überwiegend richtigen Verwendung unterscheiden.

  # NOTE: die Perspektiv-Hedges ("meiner Meinung nach" usw.) wurden komplett entfernt —
  # das sind keine Verwechslungsfehler (gehören thematisch nicht in eine
  # Falsche-Freunde-Datei) und in Meinungstexten/Rezensionen oft legitim, kein Fehler.
