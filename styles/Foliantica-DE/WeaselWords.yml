# Quellen / Sources:
#   - Wolf Schneider: "Deutsch fürs Leben" (Rowohlt, 1994), Kap. "Weichmacher" und "Füllwörter"
#   - Wolf Schneider: "Deutsch! Das Handbuch für attraktives Schreiben" (Rowohlt, 2005)
#   - Ludwig Reiners: "Stilkunst" (C.H. Beck, 1961), §§ "Das überflüssige Wort"
#   - Bastian Sick: Zwiebelfisch-Kolumnen (Spiegel Online / Kiepenheuer & Witsch)
#   - Bundesverwaltungsamt: "Leitfaden Bürgernahe Sprache" (2002)
#   - Netzwerk Leichte Sprache: Regeln für Leichte Sprache (2013), www.leichte-sprache.org
extends: existence
message: "'%s' ist ein Füllwort — überprüfen ob weglassbar?"
level: warning
ignorecase: true
tokens:
  # --- Abschwächer / Hedges (Schneider: "Weichmacher") ---
  # NOTE: "eigentlich" und "irgendwie" entfernt — zu häufig in normaler Prosa,
  # um als verlässliches Signal zu taugen (existence-Regel kann Häufung nicht erkennen).
  - \bgewissermaßen\b
  - \bsozusagen\b
  - \bquasi\b
  - \bgleichsam\b
  - \bim Prinzip\b
  - \bim Grunde\b
  - \bim Grunde genommen\b
  - \bin gewisser Weise\b
  - \bin gewissem Sinne\b
  - \bauf gewisse Weise\b

  # --- Intensifier, die paradoxerweise abschwächen (Schneider; Reiners) ---
  # NOTE: "wirklich/echt/sehr/absolut/total/völlig/gänzlich/vollkommen" entfernt —
  # zu häufig in normaler Prosa und oft inhaltlich berechtigt (echter Gradmesser).
  - \bregelrecht\b
  - \bgeradezu\b
  - \bschier\b
  - \bausgesprochen\b
  - \büberaus\b
  - \bungemein\b
  - \baußerordentlich\b
  - \baußergewöhnlich\b
  - \bmaßgeblich\b
  - \bnachhaltig\b

  # --- Selbstverständlichkeiten (Schneider; Sick) ---
  # NOTE: "natürlich/selbstverständlich/offensichtlich/offenbar/bekanntlich" entfernt —
  # zu häufig als neutrale Konnektoren in normaler Prosa.
  - \boffenkundig\b
  - \baugenscheinlich\b
  - \bzweifellos\b
  - \bzweifelsohne\b
  - \bfreilich\b
  - \bunbestreitbar\b

  # --- Vage Mengenangaben (Schneider; Reiners) ---
  # NOTE: ganze Kategorie entfernt — "einige/mehrere/zahlreiche/diverse/verschiedene/
  # gewisse/bestimmte" sind normale, oft präzise Quantifikatoren; eine existence-Regel
  # kann nicht zwischen vager Floskel und sachlich korrekter Mengenangabe unterscheiden.

  # --- Epistemische Hedges / vage Wahrscheinlichkeit (Sick; Schneider) ---
  # NOTE: "dürfte/eventuell/vielleicht/möglicherweise" entfernt — neutrale Modalwörter,
  # die in fast jedem Text legitim vorkommen. Behalten: Wörter, die unbelegte
  # Behauptungen kennzeichnen (enger gefasstes, selteneres Signal).
  - anscheinend
  - scheinbar
  - \bvermeintlich\b
  - \bangeblich\b
  - \bunter Umständen\b
  - \bim Zweifel\b
  - \bim Großen und Ganzen\b

  # --- Zeitliche Weasel Words (Bundesverwaltungsamt; Schneider) ---
  - zeitnah
  - \bkurzfristig\b
  - \bmittelfristig\b
  - \blangfristig\b
  - \bin absehbarer Zeit\b
  - \bin Kürze\b
  - \bschnellstmöglich\b
  - \bschnellstens\b
  - \bso bald wie möglich\b
  - \bzu gegebener Zeit\b
  - \bin naher Zukunft\b
  - \birgendwann\b
  - \bfrüher oder später\b

  # --- Bürokratisches Füllwerk / Amtsdeutsch (Bundesverwaltungsamt; Schneider) ---
  - \bim Rahmen\b
  - seitens
  - vonseiten
  - diesbezüglich
  - dahingehend
  - \bvor diesem Hintergrund\b
  - \bvor dem Hintergrund\b
  - \bim Lichte dessen\b
  - \bangesichts dessen\b
  - \bdementsprechend\b
  - \bmithin\b
  - \bes sei darauf hingewiesen\b
  - \ban dieser Stelle\b
  - \bes ist festzustellen\b
  - \bes ist anzumerken\b
  - \bes ist zu beachten\b
  - \bfür den Fall dass\b
  - \bim Falle\b

  # --- Floskeln / bedeutungsarmes Framing (Schneider; Reiners) ---
  # NOTE: "normalerweise/gewöhnlich/übrigens" entfernt — neutrale, häufige Konnektoren.
  - \bletztendlich\b
  - \bletzten Endes\b
  - \bim Endeffekt\b
  - \bgrundsätzlich\b
  - \bim Wesentlichen\b
  - \bin diesem Zusammenhang\b
  - \bnichtsdestotrotz\b
  - \bnichtsdestoweniger\b
  - \binfolgedessen\b

  # --- Vage Approximatoren (Schneider) ---
  # NOTE: "ziemlich/relativ" entfernt — sehr häufige, neutrale Gradangaben.
  - \beinigermaßen\b
  - \bweitgehend\b
  - \bvergleichsweise\b
  - \bin etwa\b

  # --- Relativierungswörter (Sick; Schneider) ---
  - \bsogenannt\b
  - sogenannte
  - sogenannten
  - \bsprichwörtlich\b
  - \bim wahrsten Sinne des Wortes\b
  - \bdie Problematik\b
  - \bdie Thematik\b
