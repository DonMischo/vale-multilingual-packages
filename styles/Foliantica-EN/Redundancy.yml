extends: substitution
message: "'%s' is redundant — consider '%s'."
level: warning
swap:
  # Classic English pleonasms
  end result: result
  past history: history
  past experience: experience
  future plans: plans
  future prospects: prospects
  advance warning: warning
  advance notice: notice
  added bonus: bonus
  free gift: free
  safe haven: haven
  true facts: facts
  unexpected surprise: surprise
  final conclusion: conclusion
  final outcome: outcome
  close proximity: proximity
  brief moment: moment
  sudden crisis: crisis
  new innovation: innovation
  new recruit: recruit
  old adage: adage
  foreign imports: imports
  basic fundamentals: fundamentals
  general consensus: consensus
  past memories: memories
  temporary reprieve: reprieve
  revert back: revert
  return back: return
  refer back: refer
  repeat again: repeat
  join together: join
  merge together: merge
  combine together: combine
  sum total: total
  exactly the same: the same

  # Redundant intensifiers on absolutes (write-good misses these)
  very unique: unique
  completely unique: unique
  absolutely unique: unique
  very essential: essential
  completely essential: essential
  very unanimous: unanimous
  very infinite: infinite
  very perfect: perfect
  completely perfect: perfect
  absolutely perfect: perfect

  # Bureaucratic / legal pairs
  null and void: void
  first and foremost: first
  each and every: every
  various different: various
  any and all: all

  # RAS syndrome
  PIN number: PIN
  ATM machine: ATM
  HIV virus: HIV
  LCD display: LCD
  PDF format: PDF
  GPS system: GPS
  ISBN number: ISBN
  Please RSVP: RSVP
