# Sources :
#   - Académie française : recommandations officielles et mises en garde contre les anglicismes
#   - Commission générale de terminologie et de néologie : enrichissement de la langue française (Journal officiel)
#   - FranceTerme : france-terme.culture.fr — termes officiels recommandés
#   - Office québécois de la langue française (OQLF) : Grand dictionnaire terminologique
#   - Jean Girodet : « Dictionnaire des pièges et difficultés de la langue française » (Bordas, 1988)
#   - Maurice Grevisse / André Goosse : « Le Bon Usage » (De Boeck, 15e éd., 2011)
extends: substitution
message: "Anglicisme : '%s' — en français : '%s' ?"
level: suggestion
ignorecase: true
swap:
