# Sources :
#   - Maurice Grevisse / André Goosse : « Le Bon Usage » (De Boeck, 15e éd., 2011)
#   - Jean Girodet : « Dictionnaire des pièges et difficultés de la langue française » (Bordas, 1988)
#   - Académie française : recommandations officielles et mises en garde
#   - Office québécois de la langue française (OQLF) : Grand dictionnaire terminologique
#   - Commission générale de terminologie et de néologie : enrichissement du français
extends: existence
message: "'%s' est un terme vague ou remplissage — formuler plus précisément ?"
level: warning
ignorecase: true
