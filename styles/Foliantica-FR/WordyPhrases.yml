  # --- Chevilles rédactionnelles (Girodet ; Grevisse) ---
  il y a lieu de: il faut
  il est nécessaire de: il faut
  il est indispensable de: il faut
  il importe de: il faut
  il s'avère nécessaire de: il faut
  comme il a été dit précédemment: comme dit précédemment
  ainsi que mentionné ci-dessus: comme mentionné
  comme évoqué plus haut: comme évoqué
  comme indiqué précédemment: comme indiqué
  en définitive et en résumé: en résumé
  en conclusion et en résumé: en conclusion
