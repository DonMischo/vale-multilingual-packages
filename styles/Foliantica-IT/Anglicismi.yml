# Fonti / Sources:
#   - Accademia della Crusca (Firenze, 1583): pareri e consulenze sugli anglicismi — accademicadellacrusca.it
#   - Tullio De Mauro: "Grande dizionario italiano dell'uso" (GRADIT, UTET, 1999)
#   - Valeria Della Valle / Giuseppe Patota: "Viva l'italiano!" (Sperling & Kupfer, 2009)
#   - Luca Serianni: "Guida all'italiano" (BUR, 2007)
#   - Beppe Severgnini: "L'italiano: lezioni semiserie" (Rizzoli, 2007)
#   - Ministero per la pubblica amministrazione: "Guida alla semplificazione del linguaggio amministrativo"
extends: substitution
message: "Anglicismo: '%s' — in italiano: '%s'?"
level: suggestion
ignorecase: true
swap:
