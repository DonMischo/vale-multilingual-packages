  # --- "fornire" + sostantivo (Piemontese; Calvino) ---
  fornire assistenza a: assistere
  fornire supporto a: supportare
  fornire informazioni a: informare
  fornire spiegazioni a: spiegare
  fornire chiarimenti a: chiarire
