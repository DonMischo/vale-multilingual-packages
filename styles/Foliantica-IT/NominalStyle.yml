  dare avvio a: avviare
  dare corso a: procedere
  dare esecuzione a: eseguire
  dare inizio a: iniziare
  dare risposta a: rispondere
  dare soluzione a: risolvere
  dare supporto a: supportare
  dare comunicazione di: comunicare
  dare notizia di: informare di
  dare luogo a: causare
  dare seguito a: seguire

  # --- "mettere" + sostantivo (Calvino; Piemontese) ---
  mettere in atto: attuare
  mettere in opera: realizzare
  mettere in pratica: praticare
  mettere in discussione: discutere
  mettere in evidenza: evidenziare
