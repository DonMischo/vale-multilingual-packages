# Fonti / Sources:
#   - Luca Serianni: "Italiano" (Garzanti, 1988/2000)
#   - Luca Serianni: "Guida all'italiano" (BUR, 2007)
#   - Maurizio Piemontese: "Manuale di stile" (Presidenza del Consiglio dei Ministri, 1997)
#   - Italo Calvino: "L'antilingua" (Il Giorno, 1965) — critica al nominalismo burocratico
#   - Accademia della Crusca: consulenze linguistiche — accademicadellacrusca.it
#   - Ministero per la pubblica amministrazione: "Guida alla semplificazione del linguaggio amministrativo"
extends: substitution
message: "Stile nominale: '%s' — più diretto: '%s'?"
level: suggestion
ignorecase: true
swap:
  # --- "procedere a" (Calvino; Piemontese: il verbo semplice è sempre preferibile) ---
  procedere all'esame di: esaminare
  procedere alla verifica di: verificare
  procedere alla firma di: firmare
  procedere all'apertura di: aprire
  procedere alla chiusura di: chiudere
  procedere al pagamento di: pagare
  procedere alla lettura di: leggere
  procedere alla consegna di: consegnare
  procedere alla revisione di: revisionare
  procedere all'analisi di: analizzare
  procedere alla valutazione di: valutare
  procedere alla selezione di: selezionare
  procedere alla nomina di: nominare
  procedere all'approvazione di: approvare
  procedere all'invio di: inviare

  # --- "effettuare" come verbo generico (Piemontese; Calvino) ---
  effettuare un pagamento: pagare
  effettuare un controllo: controllare
  effettuare una visita: visitare
  effettuare uno spostamento: spostarsi
