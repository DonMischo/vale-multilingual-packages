  effettuare un deposito: depositare
  effettuare una ricerca: ricercare
  effettuare un'analisi: analizzare
  effettuare un sopralluogo: fare un sopralluogo

  # --- "realizzare" come verbo generico (Calvino; Accademia della Crusca) ---
  realizzare uno studio: studiare
  realizzare un'analisi: analizzare
  realizzare un investimento: investire
  realizzare un acquisto: acquistare
  realizzare una vendita: vendere
  realizzare un'indagine: indagare
  realizzare una valutazione: valutare
  realizzare una visita: visitare

  # --- "portare a" (Piemontese; Serianni) ---
  portare a compimento: completare
  portare a termine: completare
  portare a conclusione: concludere
  portare a realizzazione: realizzare
  portare all'attenzione: segnalare
  portare a conoscenza: comunicare
  portare a soluzione: risolvere

  # --- "dare" + sostantivo (Calvino; Piemontese) ---
