# Fontes / Sources:
#   - Academia Brasileira de Letras (ABL): Vocabulário Ortográfico da Língua Portuguesa (VOLP) — volp.academia.org.br
#   - Academia das Ciências de Lisboa (ACL): Vocabulário Ortográfico do Português — academia.pt
#   - Vocabulário Ortográfico Comum (VOC) — Acordo Ortográfico 2009: vocabulario.cplp.org
